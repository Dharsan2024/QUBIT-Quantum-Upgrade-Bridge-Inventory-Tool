[project]
name = "qubit-bridge"
version = "0.1.0"
description = "QUBIT bridge (placeholder — see docs/design)"
requires-python = ">=3.12,<3.14"
license = "MIT"
dependencies = [
    "qubit-core",
    "typer>=0.12",
    "pydantic>=2.7",
    "httpx>=0.27",
]
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/qubit_bridge"]
