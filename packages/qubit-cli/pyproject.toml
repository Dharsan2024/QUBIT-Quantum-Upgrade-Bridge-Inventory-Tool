[project]
name = "qubit-cli"
version = "0.1.0"
description = "QUBIT command-line interface (qubit)"
requires-python = ">=3.12,<3.14"
license = "MIT"
dependencies = [
  "qubit-core",
  "qubit-scanner",
  "qubit-api",
  "alembic>=1.13",
  "typer>=0.12",
  "rich>=13",
]

[project.scripts]
qubit = "qubit_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/qubit_cli"]
