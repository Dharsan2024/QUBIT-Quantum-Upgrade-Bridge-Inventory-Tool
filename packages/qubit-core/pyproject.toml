[project]
name = "qubit-core"
version = "0.1.0"
description = "QUBIT shared core: CryptoAsset schema, algorithm registry, fingerprinting, DB, CBOM"
requires-python = ">=3.12,<3.14"
license = "MIT"
readme = "README.md"
dependencies = [
  "pydantic>=2.7",
  "sqlalchemy>=2.0.30",
  "alembic>=1.13",
  "platformdirs>=4.2",
]

[project.optional-dependencies]
# Optional hosted-Postgres backend (e.g. Neon). Default stays offline SQLite.
# Enable with: uv sync --extra postgres
postgres = ["psycopg[binary]>=3.2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/qubit_core"]

[tool.mypy]
strict = true
