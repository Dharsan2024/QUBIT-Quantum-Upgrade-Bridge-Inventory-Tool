[project]
name = "qubit-risk"
version = "0.1.0"
description = "QUBIT HNDL risk engine: Monte-Carlo CRQC timeline, sensitivity, Mosca margin, risk score"
requires-python = ">=3.12,<3.14"
license = "MIT"
dependencies = [
  "qubit-core",
  "numpy>=2.0",
  "scipy>=1.13",
  "pyyaml>=6",
  "pgmpy>=1.0",
]

# Optional Tier-2 training stack (doc 02 §6.3.3). Base install stays lean; enable with
# `uv sync --extra ml`. Dataset synthesis (Tier 1) needs none of this.
[project.optional-dependencies]
ml = [
  "transformers>=4.44",
  "torch>=2.2",
  "datasets>=2.20",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/qubit_risk"]
