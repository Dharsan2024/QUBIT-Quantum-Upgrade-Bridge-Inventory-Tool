[project]
name = "qubit-scanner"
version = "0.1.0"
description = "QUBIT discovery: code (tree-sitter AST) / config / network / cert crypto scanning + CBOM"
requires-python = ">=3.12,<3.14"
license = "MIT"
dependencies = [
  "qubit-core",
  "tree-sitter>=0.23",
  "tree-sitter-language-pack>=0.9",
  "pyyaml>=6",
  "pathspec>=0.12",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/qubit_scanner"]
