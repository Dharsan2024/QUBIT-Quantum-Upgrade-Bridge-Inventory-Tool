schema: qubit-rule/v1
language: go
library:
  name: Go crypto
  detect_imports: [crypto]
rules:
  - id: GO-CRYPTO-RSA-GENERATEKEY
    title: rsa.GenerateKey(rand, bits)
    match:
      query: |
        (call_expression
          function: (selector_expression
            operand: (identifier) @pkg
            field: (field_identifier) @fn)
          arguments: (argument_list (_) (int_literal) @size)) @call
      where:
        - { capture: pkg, equals: rsa }
        - { capture: fn, equals: GenerateKey }
    extract:
      algorithm: { literal: RSA }
      key_size: { from: size, resolve: int-literal }
    asset: { asset_type: algorithm-use, usage_context: kex }
    confidence: high
    examples:
      positive:
        - |
          package main
          import "crypto/rsa"
          func f() { rsa.GenerateKey(rand.Reader, 2048) }
      negative:
        - |
          package main
          import "crypto/ecdsa"
          func f() { ecdsa.GenerateKey(elliptic.P256(), rand.Reader) }

  - id: GO-CRYPTO-ECDSA-P256
    title: ecdsa.GenerateKey(elliptic.P256(), ...)
    match:
      query: |
        (call_expression
          function: (selector_expression
            operand: (identifier) @pkg
            field: (field_identifier) @fn)
          arguments: (argument_list
            (call_expression
              function: (selector_expression
                operand: (identifier) @curve_pkg
                field: (field_identifier) @curve))
            (_))) @call
      where:
        - { capture: pkg, equals: ecdsa }
        - { capture: fn, equals: GenerateKey }
        - { capture: curve_pkg, equals: elliptic }
        - { capture: curve, equals: P256 }
    extract:
      algorithm: { literal: ECDSA-P256 }
    asset: { asset_type: algorithm-use, usage_context: signature }
    confidence: high
    examples:
      positive:
        - |
          package main
          import "crypto/ecdsa"
          func f() { ecdsa.GenerateKey(elliptic.P256(), rand.Reader) }
      negative:
        - |
          package main
          import "crypto/ecdsa"
          func f() { ecdsa.GenerateKey(elliptic.P384(), rand.Reader) }

