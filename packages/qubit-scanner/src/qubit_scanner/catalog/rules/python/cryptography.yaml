schema: qubit-rule/v1
language: python
library:
  name: cryptography
  detect_imports: [cryptography]
rules:
  - id: PY-CRYPTOGRAPHY-RSA-KEYGEN
    title: RSA private-key generation (rsa.generate_private_key)
    match:
      query: |
        (call
          function: (attribute attribute: (identifier) @meth)
          arguments: (argument_list
            (keyword_argument
              name: (identifier) @kw
              value: (integer) @size))) @call
      where:
        - { capture: meth, equals: generate_private_key }
        - { capture: kw, equals: key_size }
    extract:
      algorithm: { literal: RSA }
      key_size: { from: size, resolve: int-literal }
    asset: { asset_type: algorithm-use, usage_context: kex }
    confidence: high
    examples:
      positive:
        - |
          from cryptography.hazmat.primitives.asymmetric import rsa
          key = rsa.generate_private_key(public_exponent=65537, key_size=2048)
      negative:
        - "from cryptography.hazmat.primitives.asymmetric import x25519"

  - id: PY-CRYPTOGRAPHY-EC-KEYGEN
    title: EC private-key generation (ec.generate_private_key)
    match:
      query: |
        (call
          function: (attribute object: (identifier) @mod attribute: (identifier) @meth)) @call
      where:
        - { capture: mod, equals: ec }
        - { capture: meth, equals: generate_private_key }
    extract:
      algorithm: { literal: ECDSA-P256 }
    asset: { asset_type: algorithm-use, usage_context: signature }
    confidence: medium
    examples:
      positive:
        - |
          from cryptography.hazmat.primitives.asymmetric import ec
          key = ec.generate_private_key(ec.SECP256R1())
      negative:
        - "from cryptography.hazmat.primitives.asymmetric import rsa"

  - id: PY-CRYPTOGRAPHY-X25519-KEYGEN
    title: X25519 private-key generation
    match:
      query: |
        (call
          function: (attribute object: (identifier) @cls attribute: (identifier) @meth)) @call
      where:
        - { capture: cls, equals: X25519PrivateKey }
        - { capture: meth, equals: generate }
    extract:
      algorithm: { literal: X25519 }
    asset: { asset_type: algorithm-use, usage_context: kex }
    confidence: high
    examples:
      positive:
        - |
          from cryptography.hazmat.primitives.asymmetric.x25519 import X25519PrivateKey
          key = X25519PrivateKey.generate()
      negative:
        - |
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey
          key = Ed25519PrivateKey.generate()

  - id: PY-CRYPTOGRAPHY-ED25519-KEYGEN
    title: Ed25519 private-key generation
    match:
      query: |
        (call
          function: (attribute object: (identifier) @cls attribute: (identifier) @meth)) @call
      where:
        - { capture: cls, equals: Ed25519PrivateKey }
        - { capture: meth, equals: generate }
    extract:
      algorithm: { literal: Ed25519 }
    asset: { asset_type: algorithm-use, usage_context: signature }
    confidence: high
    examples:
      positive:
        - |
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey
          key = Ed25519PrivateKey.generate()
      negative:
        - |
          from cryptography.hazmat.primitives.asymmetric.x25519 import X25519PrivateKey
          key = X25519PrivateKey.generate()

  - id: PY-CRYPTOGRAPHY-HASHES-BROKEN
    title: cryptography hashes.MD5()/hashes.SHA1()
    match:
      query: |
        (call
          function: (attribute object: (identifier) @obj attribute: (identifier) @alg)) @call
      where:
        - { capture: obj, equals: hashes }
        - { capture: alg, in: [MD5, SHA1] }
    extract:
      algorithm: { from: alg, resolve: capture-text }
    asset: { asset_type: algorithm-use, usage_context: hash }
    confidence: high
    examples:
      positive:
        - |
          from cryptography.hazmat.primitives import hashes
          digest = hashes.Hash(hashes.SHA1())
        - |
          from cryptography.hazmat.primitives import hashes
          digest = hashes.Hash(hashes.MD5())
      negative:
        - |
          from cryptography.hazmat.primitives import hashes
          digest = hashes.Hash(hashes.SHA256())
